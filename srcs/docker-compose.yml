services: 
 mariadb: 
  build: ./requirements/mariadb
  container_name: mariadb
  volumes:
   - mariadb_data:/var/lib/mysql
  environment: 
   MYSQL_NAME: ${DB_NAME}
   MYSQL_USER: ${DB_USER}
   MYSQL_PASSWORD: ${DB_PASSWORD}
   MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
  networks: 
   - inception
  restart: always
 wordpress:
  depends_on: 
   mariadb: 
    condition: service_started
  build: ./requirements/wordpress
  container_name: wordpress
  volumes:
   - wordpress_data:/var/www/html
  environment:
   DB_NAME: ${DB_NAME}
   DB_USER: ${DB_USER}
   DB_PASSWORD: ${DB_PASSWORD}
   DOMAIN_NAME: ${DOMAIN_NAME}
   WP_TITLE: ${WP_TITLE}
   WP_ADMIN_USER: ${WP_ADMIN_USER}
   WP_ADMIN_PASSWORD: ${WP_ADMIN_PASSWORD}
   WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL}
   WP_USER: ${WP_USER}
   WP_USER_EMAIL: ${WP_USER_EMAIL}
   WP_USER_PASS: ${WP_USER_PASS}
  networks: 
   - inception
  restart: always
 nginx:
  depends_on: 
   wordpress: 
    condition: service_started 
  build: ./requirements/nginx
  container_name: nginx
  volumes: 
   - wordpress_data:/var/www/html
  ports: 
   - 443:443
  environment: 
   DOMAIN_NAME: ${DOMAIN_NAME}
  networks:
   - inception
  restart: always
volumes:
  mariadb_data:
   driver: local  
   driver_opts: 
    type: none
    o: bind
    #device: /home/kaisuzuk/data/mariadb
    device: /Users/suzukikaisei/Desktop/data/mariadb
  wordpress_data:
   driver: local
   driver_opts: 
    type: none
    o: bind
    #device: /home/kaisuzuk/data/wordpress
    device: /Users/suzukikaisei/Desktop/data/wordpress
networks: 
  inception:
   driver: bridge 
   