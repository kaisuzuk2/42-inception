services: 
 mariadb: 
  build: ./requirements/mariadb
  container_name: mariadb
  volumes:
   - mariadb_data:/var/lib/mysql
  environment: 
   MYSQL_NAME: ${DB_NAME}
   MYSQL_USER: ${DB_USER}
  networks: 
   - inception
  restart: always
  secrets: 
   - db_password
   - db_root_password
 wordpress:
  depends_on: 
   mariadb: 
    condition: service_started
  build: ./requirements/wordpress
  container_name: wordpress
  volumes:
   - wordpress_data:/var/www/html
  environment:
   DB_NAME: ${DB_NAME}
   DB_USER: ${DB_USER}
   DOMAIN_NAME: ${DOMAIN_NAME}
   WP_TITLE: ${WP_TITLE}
  networks: 
   - inception
  restart: always
  secrets:
   - credentials
   - db_password
 nginx:
  depends_on: 
   wordpress: 
    condition: service_started 
  build: ./requirements/nginx
  container_name: nginx
  volumes: 
   - wordpress_data:/var/www/html
  ports: 
   - 443:443
  environment: 
   DOMAIN_NAME: ${DOMAIN_NAME}
  networks:
   - inception
  restart: always
volumes:
  mariadb_data:
   driver: local  
   driver_opts: 
    type: none
    o: bind
    #device: /home/kaisuzuk/data/mariadb
    device: /Users/suzukikaisei/Desktop/data/mariadb
  wordpress_data:
   driver: local
   driver_opts: 
    type: none
    o: bind
    #device: /home/kaisuzuk/data/wordpress
    device: /Users/suzukikaisei/Desktop/data/wordpress
networks: 
  inception:
   driver: bridge 
secrets:
 credentials:
  file: ../secrets/credentials.txt
 db_password:
  file: ../secrets/db_password.txt
 db_root_password:
  file: ../secrets/db_root_password.txt
   